server {
    listen 8002;
	server_name localhost;
    host 127.0.0.1;
    root docs/fusion_web/;
    client_max_body_size 3000000;
	index index.html;
    error_page 404 error_pages/404.html;
    error_page 400 error_pages/400.html;

    location / {
        allow_methods  DELETE POST GET;
        autoindex off;
    }
    
    location /home {
        autoindex on;
        index home.html;
        allow_methods GET POST PUT HEAD;
    }

	location /go {
		return /tours;
	}

}